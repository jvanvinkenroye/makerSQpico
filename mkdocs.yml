site_name: Pico HID Lernprojekt
site_url: https://sq.jvlb.de
site_description: Raspberry Pi Pico als USB-HID-Gerät mit CircuitPython
docs_dir: docs

theme:
  name: material
  language: de
  palette:
    - scheme: default
      primary: deep purple
      accent: purple
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

nav:
  - Startseite: index.md
  - Schritte:
    - 1. Verbindung: 01_verbindung.md
    - 2. CircuitPython installieren: 02_circuitpython_install.md
    - 3. Bibliotheken einrichten: 03_bibliotheken.md
    - 4. Blink: 04_blink.md
    - 5. HID – Spacebar: 05_hid_spacebar.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
